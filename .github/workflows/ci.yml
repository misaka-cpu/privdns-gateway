name: CI

# 纯静态校验: 不启动 mosdns / sing-box / nftables, 只检查能不能编译 / 语法 / 渲染。
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Python 语法 (py_compile)
        run: python3 -m py_compile deploy/bot/*.py tests/*.py

      - name: Shell 语法 (bash -n)
        run: |
          bash -n install.sh uninstall.sh \
            deploy/bot/*.sh deploy/cert/*.sh lib/*.sh

      - name: JSON 模板渲染后可解析
        run: |
          set -euo pipefail
          render() {
            sed -e 's|__SERVER_IP__|203.0.113.1|g' \
                -e 's|__INTERNAL_CIDR__|172.22.0.0/16|g' \
                -e 's|__CERT_DIR__|/etc/mosdns/certs|g' \
                -e 's|__SSH_PORT__|22|g' "$1"
          }
          for t in deploy/singbox/config.json.tmpl; do
            echo "→ 渲染并校验 $t"
            render "$t" | python3 -m json.tool > /dev/null
            # jq 在 ubuntu-latest 默认就有, 再用它复核一遍
            if command -v jq >/dev/null; then render "$t" | jq -e . > /dev/null; fi
            echo "  OK"
          done

      - name: mobileconfig 模板是合法 plist/XML
        run: |
          python3 - <<'PY'
          import plistlib, glob, sys
          ok = True
          for f in glob.glob("deploy/ios/*.mobileconfig.tmpl"):
              try:
                  plistlib.load(open(f, "rb")); print("  OK", f)
              except Exception as e:
                  print("  FAIL", f, e); ok = False
          sys.exit(0 if ok else 1)
          PY

      - name: systemd unit 静态检查 (best-effort, 不阻断)
        continue-on-error: true
        run: |
          if command -v systemd-analyze >/dev/null; then
            systemd-analyze verify \
              deploy/bot/pdg-bot.service deploy/bot/pdg-health.service \
              deploy/bot/pdg-rules-update.service deploy/bot/pdg-health.timer \
              deploy/bot/pdg-rules-update.timer deploy/ios/pdg-probe81.service || true
            echo "(CI 环境缺二进制/路径, 上面的告警多为预期; 重点看指令拼写/语法错)"
          else
            echo "systemd-analyze 不可用, 跳过"
          fi

      - name: "ShellCheck (阻断: 有 warning 即失败)"
        run: |
          command -v shellcheck >/dev/null || sudo apt-get install -y -q shellcheck
          shellcheck --severity=warning -e SC1091 \
            install.sh uninstall.sh deploy/bot/*.sh deploy/cert/*.sh lib/*.sh tests/*.sh

      - name: "防火墙迁移识别回归 (原装应迁移 / 自定义应跳过)"
        run: bash tests/test-fw-migration.sh

      - name: "mosdns concurrent 迁移回归 (单上游=1/多上游=2/幂等)"
        run: bash tests/test-mosdns-concurrent.sh

      - name: "低内存模式回归 (fixture meminfo 解析/渲染/迁移幂等)"
        run: bash tests/test-lowmem.sh

      - name: "switch-core 内核切换纪律回归 (假 systemctl+重启模拟: 只起一个内核/跨核回滚/unit 无漂移)"
        run: bash tests/test-switch-core.sh

      - name: "switch-core 失败诊断回归 (转不了的出口逐个列名/内核真实报错/日志线索, 不再一句话糊过去)"
        run: bash tests/test-switch-core-diag.sh

      - name: "平台隔离安装/迁移矩阵 (marker 证据回退/GMS 仅安卓/iOS GMS 清理/服务集按平台)"
        run: bash tests/test-platform-install.sh

      - name: "GMS 推送端口迁移回归 (fw/sing-box 补 5228-5230, 自定义跳过, 失败回滚)"
        run: bash tests/test-gms-migration.sh

      - name: "v1.4.x→WLOC 迁移回归 (补 force_hijack/seq/优先级规则/mitm_hijack, 幂等/自定义跳过/失败还原)"
        run: bash tests/test-mitm-migration.sh

      - name: "parse_link 多协议回归 (各协议链接 + Surge ss 行字段映射)"
        run: python3 tests/test-parse-links.py

      - name: "发布链路回归 (tag-only 安装/更新 + 文档版本)"
        run: bash tests/test-release-flow.sh

      - name: "更新快照+精确回滚回归 (--dir 精确目标/--git 复位/部分失败不谎报/快照覆盖脚本)"
        run: bash tests/test-update-rollback.sh

      - name: "update 关键步骤故障注入 (git reset/必需文件/迁移/内核/daemon-reload 失败均回滚且不谎报成功)"
        run: bash tests/test-update-faults.sh

      - name: "内核热切回归 (check/重启不稳定均还原旧核; 稳定后才删 .prev; 快照含内核二进制)"
        run: bash tests/test-core-swap.sh

      - name: "install 回滚回归 (set -u 下不因未初始化变量二次崩溃; 系统级还原完整; 只删本次新装)"
        run: bash tests/test-install-rollback.sh

      - name: "install 二进制事务回归 (备份失败即中止/半截安装可恢复/强制重装也还原/清理失败不假报)"
        run: bash tests/test-install-bintxn.sh

      - name: "bot 导航回归 (操作结果不刷一级菜单)"
        run: python3 tests/test-bot-nav.py

      - name: "bot 凭据保护/后台执行器/BUSY 锁回归"
        run: python3 tests/test-bot-credential.py

      - name: "观测面板回归 (zashboard 开关 + clash_api secret)"
        run: python3 tests/test-panel.py

      - name: "面板快照/回滚净化回归 (secret 不入档)"
        run: bash tests/test-panel-snapshot.sh

      - name: "bot 测域名规则集显示名回归"
        run: python3 tests/test-domain-label.py

      - name: "出口改名级联回归 (规则/故障组/final/TG 同步)"
        run: python3 tests/test-exit-rename.py

      - name: "iOS 描述文件回归 (Wi-Fi 探测判定 + SSID 直连名单)"
        run: python3 tests/test-ios-ssid.py

      - name: "自检防火墙端口回归"
        run: python3 tests/test-doctor-firewall.py

      - name: "分流规则→mosdns 劫持同步回归 (指到出口的域名必须被 mosdns 劫持, 否则规则是死的)"
        run: python3 tests/test-rule-hijack-sync.py


      - name: "CLI/report/bot 杂项回归 (rollback 校验/inet pdg/菜单 exec)"
        run: python3 tests/test-maintenance-polish.py

      - name: "sb2mihomo 渲染层回归 (sing-box 配置→mihomo 各协议/组/规则映射)"
        run: python3 tests/test-sb2mihomo.py

      - name: "Hysteria v1/v2 转换回归 (v1→hysteria, v2→hysteria2, 不支持→拒绝, 真 mihomo -t)"
        run: python3 tests/test-hysteria-convert.py

      - name: "bot 内核后端切换回归 (mihomo/singbox 分支 + apply_sb 事务回滚)"
        run: python3 tests/test-mihomo-backend.py

      - name: "TFO 状态回归 (持久化意图 + 加出口不冲掉 + 渲染映射)"
        run: python3 tests/test-tfo.py

      - name: "MITM CA 骨架回归 (自签 CA + 叶子证书验链/SAN/EKU/缓存)"
        run: python3 tests/test-mitm-ca.py

      - name: "MITM CA 并发回归 (24 线程+跨进程同域签发: 0 异常/cert-key 匹配/无残留)"
        run: python3 tests/test-mitm-ca-concurrent.py

      - name: "MITM 服务回归 (socks5→CA叶子终止TLS→插件; 客户端CA验链; 非接管兜底关闭)"
        run: python3 tests/test-mitm-server.py

      - name: "Apple WLOC 插件回归 (gs-loc protobuf 编解码 + 坐标改写 + 负坐标)"
        run: python3 tests/test-mitm-wloc.py

      - name: "WLOC bot 后端回归 (set_wloc 开关/坐标/平台门控/接管域名同源)"
        run: python3 tests/test-mitm-wloc-bot.py

      - name: "平台文案/门控回归 (客户端·状态·WLOC 按平台/内核 + README 文案一致)"
        run: python3 tests/test-platform-copy.py

      - name: "诊断报告内核一致性 (版本/日志按当前后端取, mihomo 机上不再固定问 sing-box)"
        run: python3 tests/test-report-backend.py

      - name: "WLOC 手机端文案一致性 (README/Bot 同一套三步 + 平台隔离)"
        run: python3 tests/test-wloc-copy.py

      - name: "WLOC 事务化回归 (BUSY/CA/内核/pdg-mitm/mosdns 故障注入均回滚, 不留 enabled=true)"
        run: python3 tests/test-mitm-wloc-txn.py

      - name: "平台隔离回归 (Android 无 iOS 按钮/回调/后端; iOS 原功能; checks 平台一致)"
        run: python3 tests/test-platform-isolation.py

  functional:
    # 真功能测试: 下载钉死 SHA256 的 sing-box / mosdns, 真起一遍, 验证两层核心链路。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 流量层 (真起 sing-box 验证按 SNI 分到不同出口 + final 兜底)
        run: bash tests/functional-test.sh
      - name: DNS 层 (真起 mosdns 验证 A 劫持 / AAAA·HTTPS 置空 / 国内直连 / 按来源门控)
        run: bash tests/dns-policy-test.sh
      - name: DNS 限流 (rate_limiter 迁移幂等 + 真起 mosdns 验证超限 REFUSED + doctor)
        run: bash tests/test-mosdns-ratelimit.sh
      - name: 出站 schema (锁定版 sing-box check 各协议 parse_link 输出)
        run: bash tests/test-outbound-schema.sh
      - name: 劫持形态 (真起 mosdns 验证 all=排除式劫持 / gfw=白名单放行)
        run: bash tests/test-hijack-shape.sh

      # ── 端到端(namespace+overlayfs 沙盒, 真实绝对路径 + 真内核/真 mosdns) ──
      # 单测都在函数级别打桩, 跨组件的接缝没人看着; 这几条查出过 GMS 重复插入、backend
      # 标记从不落地、分流规则不进 mosdns、不可转换出站被静默丢弃等接缝 bug。
      - name: E2E 老装升级 (v1.4.x 现场跑真实 pdg __migrate, 三场景 + 幂等)
        run: bash tests/e2e-migrate.sh
      - name: E2E 加落地+分流 (真 parse_link/apply_sb → 真 mihomo -t → 真 mosdns 解析)
        run: bash tests/e2e-exit-rule.sh
      - name: E2E 内核切换 (两内核真二进制真切换 + 不可转换出口必须点名拒绝)
        run: bash tests/e2e-switch-core.sh
