# 装到 /etc/systemd/journald.conf.d/50-pdg.conf — 给 journald 用量封顶, 利于小内存机。
# (journald 默认按磁盘比例, 在小机上 mmap 占用偏大; 标准 50M / 低内存 20M 足够排障。)
# __JOURNALD_MAXUSE__ 由 install 按内存模式渲染, pdg 更新按 profile 迁移。
# SystemMaxUse 管持久日志 /var/log/journal; RuntimeMaxUse 管易失日志 /run/log/journal —— 两者都封, 覆盖两类系统。
[Journal]
SystemMaxUse=__JOURNALD_MAXUSE__
RuntimeMaxUse=__JOURNALD_MAXUSE__
