#!/usr/sbin/nft -f
# PrivDNS Gateway 防火墙 —— mihomo 内核变体(与 nftables.conf 对应, 供换核原型用)。
# 与 sing-box 版的唯一区别: sing-box 用 direct 入站"裸 accept 443/80/5228-5230";
# mihomo 没有裸 accept+sniff 的入站, 只有 redir/tproxy 透明代理监听器, 且直连监听端口会触发
# 环路自保被丢弃 —— 故这里加 nat prerouting, 把内网来源的 80/443/5228-5230 REDIRECT 到
# mihomo 的 redir 端口(7893)。mihomo 靠 SO_ORIGINAL_DST 拿回原始 443/80/5228 再嗅 SNI 分流。
#
# 安全要点: REDIRECT 只匹配 `ip saddr __INTERNAL_CIDR__`(内网卡来源), 所以
#   - certbot HTTP-01 挑战来自 Let's Encrypt(外部来源), 不会被劫持, 证书续期不受影响;
#   - 公网扫描/非内网来源一律走 input 的 default-drop。
# install.sh 渲染占位符:
#   __SSH_PORT__      SSH 端口 (跟 sshd 的 Port 一致, 否则一应用即锁死)
#   __INTERNAL_CIDR__ 内网卡来源段
# 只用独立表 inet pdg, 不 flush 全局; 先 declare 再 delete 保证只重建本表。
table inet pdg
delete table inet pdg

table inet pdg {
    # 内网来源的被劫持端口 → mihomo redir(7893)。dstnat 优先级早于 filter input。
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
        ip saddr __INTERNAL_CIDR__ tcp dport { 80, 443, 5228-5230 } redirect to :7893
    }
    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ct state established,related accept
        tcp dport { __SSH_PORT__ } accept
        # 80/443/5228-5230 已在 prerouting 被改写为 7893, 故这里放行 7893(仅内网来源);
        # 53/81/853/8445 仍由各自服务直接监听(mosdns DoT / iOS 探测 / tg-proxy)。
        ip saddr __INTERNAL_CIDR__ tcp dport { 53, 81, 853, 7893, 8445 } accept
        ip saddr __INTERNAL_CIDR__ udp dport { 53 } accept
        ip saddr __INTERNAL_CIDR__ udp dport 443 reject   # QUIC/HTTP3: 拒掉, 逼客户端回落 TCP 443(可嗅 SNI 分流)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }
}
