#!/usr/sbin/nft -f
# PrivDNS Gateway 防火墙 (inet filter, policy drop)。
# 暴露面收敛:
#   - 对全网只留 22(SSH) + 853(DoT, 手机私密DNS 入口)。
#   - 53(明文DNS)/80/443/81 一律只放行内网卡来源 172.22.0.0/16
#     (53 对全网开放 = 开放解析器, 会被 DNS 放大攻击滥用, 故收紧; 手机走 DoT 不需要明文 53)。
#   - 本机自身 DNS 走 127.0.0.1 经 lo, 不受影响。
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ct state established,related accept
        tcp dport { 22, 853 } accept
        ip saddr 172.22.0.0/16 tcp dport { 53, 80, 81, 443 } accept
        ip saddr 172.22.0.0/16 udp dport { 53, 443 } accept
        # ICMP for basic network health
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }
    chain forward {
        type filter hook forward priority 0; policy accept;
    }
    chain output {
        type filter hook output priority 0; policy accept;
    }
}
